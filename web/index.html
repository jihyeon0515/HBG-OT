<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hbgym_ot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>헬스보이짐 분당정자점</title>
  <link rel="manifest" href="manifest.json">

  <!-- 즉시 반영: 예전에 등록된 서비스워커/캐시를 제거해 항상 최신 화면이 뜨게 함 -->
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
          .catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    })();
  </script>

  <!-- 구글 드라이브/시트 실시간 연동: Google Identity Services (OAuth 토큰) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // OAuth 액세스 토큰을 팝업으로 요청해 Promise로 반환한다.
    // Dart(js_interop)에서 hbgRequestGoogleToken(clientId, scope)로 호출.
    window.hbgRequestGoogleToken = function (clientId, scope) {
      return new Promise(function (resolve, reject) {
        try {
          if (!window.google || !google.accounts || !google.accounts.oauth2) {
            reject('GIS_NOT_LOADED');
            return;
          }
          var client = google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: scope,
            callback: function (resp) {
              if (resp && resp.access_token) {
                resolve(resp.access_token);
              } else {
                reject((resp && resp.error) || 'NO_TOKEN');
              }
            },
            error_callback: function (err) {
              reject((err && (err.message || err.type)) || 'AUTH_ERROR');
            }
          });
          client.requestAccessToken();
        } catch (e) {
          reject('' + e);
        }
      });
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.

    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
